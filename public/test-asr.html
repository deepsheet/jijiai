<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试模型下载</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
    }
    .status {
      margin: 20px 0;
      padding: 15px;
      border-radius: 5px;
      background: #2a2a2a;
    }
    .success {
      border-left: 4px solid #5cb85c;
    }
    .error {
      border-left: 4px solid #d9534f;
    }
    .info {
      border-left: 4px solid #5bc0de;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px 5px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background: #45a049;
    }
    pre {
      background: #000;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>🧪 测试 Whisper 模型下载</h1>
  
  <div>
    <button onclick="testDownload()">测试下载模型</button>
    <button onclick="clearLogs()">清除日志</button>
  </div>
  
  <div id="status"></div>
  
  <h3>详细日志：</h3>
  <pre id="logs"></pre>
  
  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0';
    
    // 设置国内镜像
    window.HF_ENDPOINT = 'https://hf-mirror.com';
    env.allowLocalModels = false;
    env.allowRemoteModels = true;
    
    function log(message, type = 'info') {
      const logs = document.getElementById('logs');
      const timestamp = new Date().toLocaleTimeString();
      logs.textContent += `[${timestamp}] ${message}\n`;
      logs.scrollTop = logs.scrollHeight;
      
      console.log(message);
    }
    
    function updateStatus(message, type) {
      const status = document.getElementById('status');
      status.className = `status ${type}`;
      status.textContent = message;
    }
    
    window.testDownload = async function() {
      const logs = document.getElementById('logs');
      logs.textContent = '';
      
      try {
        log('开始测试模型下载...');
        log('HF_ENDPOINT: ' + window.HF_ENDPOINT);
        log('allowLocalModels: ' + env.allowLocalModels);
        log('allowRemoteModels: ' + env.allowRemoteModels);
        
        updateStatus('正在连接 Hugging Face 镜像源...', 'info');
        
        // 测试网络连接
        log('测试网络连接...');
        const testUrl = 'https://hf-mirror.com';
        try {
          const response = await fetch(testUrl, { method: 'HEAD', mode: 'no-cors' });
          log('✓ 网络连接成功: ' + testUrl);
        } catch (e) {
          log('✗ 网络连接失败: ' + e.message);
          updateStatus('网络连接失败，请检查网络设置', 'error');
          return;
        }
        
        updateStatus('正在下载模型（约 30-50MB，请耐心等待）...', 'info');
        log('开始加载 Xenova/whisper-tiny 模型...');
        
        const startTime = Date.now();
        
        const transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', {
          quantized: true,
          progress_callback: (progress) => {
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            log(`进度 [${elapsed}s]: ${progress.status} - ${progress.progress?.toFixed(1) || 0}%`);
            
            if (progress.status === 'downloading') {
              updateStatus(`下载中... ${progress.progress?.toFixed(1) || 0}% (${elapsed}s)`, 'info');
            } else if (progress.status === 'loading') {
              updateStatus(`加载中... ${progress.progress?.toFixed(1) || 0}% (${elapsed}s)`, 'info');
            }
          }
        });
        
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        log(`✓ 模型加载成功！耗时：${elapsed}s`);
        updateStatus(`✅ 模型下载成功！耗时：${elapsed}s`, 'success');
        
        // 测试识别
        log('模型已就绪，可以进行语音识别测试');
        
      } catch (error) {
        log('✗ 失败：' + error.message);
        log('错误详情：' + JSON.stringify(error, null, 2));
        updateStatus('❌ 下载失败：' + error.message, 'error');
      }
    };
    
    window.clearLogs = function() {
      document.getElementById('logs').textContent = '';
      document.getElementById('status').textContent = '';
    };
    
    log('页面已加载，点击"测试下载模型"按钮开始测试');
  </script>
</body>
</html>
